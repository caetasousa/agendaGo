<!doctype html>
<html lang="pt-BR">
<body style="margin: 0; padding: 0; background-color: #f4f4f5;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f5; padding: 24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width: 480px; width: 100%; background-color: #ffffff; border-radius: 12px; overflow: hidden; font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;">
          <tr>
            <td style="background-color: #2563eb; padding: 20px 32px;">
              <span style="color: #ffffff; font-size: 18px; font-weight: 700; letter-spacing: -0.02em;">agendaGo</span>
            </td>
          </tr>
          <tr>
            <td style="padding: 32px;">
              <div style="display: inline-block; background-color: #fee2e2; color: #991b1b; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 999px;">Cancelado</div>
              <h1 style="margin: 16px 0 8px; font-size: 20px; color: #18181b;">Um agendamento foi cancelado</h1>
              <p style="margin: 0 0 24px; font-size: 15px; line-height: 1.5; color: #52525b;">
                Olá, {{.NomeDestinatario}}. {{.CanceladoPor}} cancelou o agendamento abaixo.
              </p>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f5; border-radius: 8px;">
                <tr>
                  <td style="padding: 16px 20px;">
                    <div style="font-size: 13px; color: #71717a; margin-bottom: 4px;">Data e horário</div>
                    <div style="font-size: 16px; font-weight: 600; color: #18181b;">{{.Data}} às {{.Horario}}</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding: 20px 32px; border-top: 1px solid #f4f4f5;">
              <p style="margin: 0; font-size: 12px; color: #a1a1aa;">Este é um email automático do agendaGo. Não responda.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
