services:
  postgres:
    image: postgres:16-alpine
    container_name: agendago_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10-alpine
    container_name: agendago_flyway
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_BASELINE_ON_MIGRATE: "true"
    volumes:
      - ./backend/migrations:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agendago_api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Admin semeado no boot (moderação). Troque em produção.
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_SENHA: ${ADMIN_SENHA}
      # Rate limiting por IP (0 desliga; padrão 10/min quando ausente)
      RATE_LIMIT_LOGIN_POR_MINUTO: ${RATE_LIMIT_LOGIN_POR_MINUTO:-10}
      RATE_LIMIT_CONVIDADO_POR_MINUTO: ${RATE_LIMIT_CONVIDADO_POR_MINUTO:-10}
      # Envio de email: em dev aponta para o Mailpit (sem TLS/auth), que
      # captura os emails em vez de enviar de verdade. Em produção, troque
      # pelas credenciais SMTP do provedor (ex.: Brevo).
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      EMAIL_REMETENTE: ${EMAIL_REMETENTE:-nao-responda@agendago.dev}
      EMAIL_REMETENTE_NOME: ${EMAIL_REMETENTE_NOME:-agendaGo}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO}
    volumes:
      - ./backend:/app
    depends_on:
      flyway:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  mailpit:
    image: axllent/mailpit
    container_name: agendago_mailpit
    ports:
      - "8025:8025" # UI web: veja os emails capturados em http://localhost:8025
      - "1025:1025" # SMTP: alvo dos emails enviados pela API em dev

  web:
    image: node:22-alpine
    container_name: agendago_web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
